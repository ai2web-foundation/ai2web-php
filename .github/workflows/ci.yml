name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  php:
    name: PHP SDK tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Lint sources
        run: find src -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run tests
        run: php tests/run.php
